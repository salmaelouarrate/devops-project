- name: Install k3s worker
  hosts: worker
  become: yes

  vars:
    master_ip: "172.31.34.29"
    token: "{{ lookup('file', './node-token') }}"

  tasks:
    - name: Join cluster
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ master_ip }}:6443 K3S_TOKEN={{ token }} sh -
      args:
        creates: /usr/local/bin/k3s-agent