<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>
<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #81ecec, #74b9ff);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 40px 0;
        margin: 0;
    }

    .container {
        width: 400px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        padding: 30px;
    }

    h1 {
        text-align: center;
        color: #2d3436;
        margin-bottom: 25px;
    }

    form {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    input[type="text"] {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #dfe6e9;
        font-size: 16px;
        outline: none;
    }

    input[type="text"]:focus {
        border-color: #e3096f;
        box-shadow: 0 0 5px rgba(0,132,255,0.5);
    }

    input[type="submit"] {
        background: #00b894;
        color: white;
        border: none;
        padding: 12px 18px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        background: #019875;
    }

    .task-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #dfe6e9;
        padding: 12px 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        transition: 0.3s;
    }

    .task-card:hover {
        background: #b2bec3;
    }

    .delete-btn {
        background: #d63031;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        text-decoration: none;
        transition: 0.3s;
    }

    .delete-btn:hover {
        background: #c0392b;
    }

    .empty {
        text-align: center;
        color: #636e72;
        font-style: italic;
        margin-top: 20px;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>📋 Mes Tâches</h1>

        <form method="POST" action="/">
            <input type="text" name="task" placeholder="Ajouter une nouvelle tâche" required>
            <input type="submit" value="Ajouter">
        </form>

        {% if tasks %}
            {% for task in tasks %}
            <div class="task-card">
                <span>{{ task }}</span>
                <a href="{{ url_for('delete_task', task_id=loop.index) }}" class="delete-btn">🗑 Supprimer</a>
            </div>
            {% endfor %}
        {% else %}
            <p class="empty">📭 Votre liste est vide</p>
        {% endif %}
    </div>
</body>
</html>
